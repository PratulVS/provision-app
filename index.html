<!DOCTYPE html>
<html>
  
<head>
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<title>Family Provision Login</title>

<style>

/* BODY */

body {

font-family:'Segoe UI',sans-serif;

background: linear-gradient(
135deg,
#dbeafe,
#fef9c3,
#dcfce7
);

height:100vh;

display:flex;
justify-content:center;
align-items:center;

}

/* MAIN BOX */

.container {

background:white;

padding:30px;

border-radius:15px;

width:320px;

box-shadow:
0 4px 15px rgba(0,0,0,0.1);

text-align:center;

}

/* BUTTONS */

.main-btn {

width:100%;

padding:14px;

margin:10px 0;

border:none;

border-radius:10px;

font-weight:bold;

cursor:pointer;

font-size:16px;

}

/* SHoba Button */

.shoba-btn {

background:#22c55e;
color:white;

}

/* Pratul Button */

.pratul-btn {

background:#3b82f6;
color:white;

}

/* LOGIN FORM */

.login-form {

margin-top:15px;

display:none;

}

/* INPUT */

input {

width:100%;

padding:10px;

margin:6px 0;

border-radius:8px;

border:1px solid #ccc;

}

/* LOGIN BUTTON */

.login-btn {

background:#2563eb;
color:white;

}

/* ERROR */

.error {

color:red;

font-size:14px;

margin-top:5px;

}

</style>

</head>

<body>

<div class="container">

<h2>Family Provisions</h2>

<!-- SHOBA BUTTON -->

<button
class="main-btn shoba-btn"
onclick="goShoba()">

👩 Shoba Dashboard

</button>

<!-- PRATUL BUTTON -->

<button
class="main-btn pratul-btn"
onclick="showLogin()">

👨 Pratul Dashboard

</button>

<!-- LOGIN FORM -->

<div
class="login-form"
id="loginForm">

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button
class="main-btn login-btn"
onclick="login()">

Login as Pratul

</button>

<p
id="errorMsg"
class="error"></p>

</div>

</div>

<script>

/* SHOBA */

function goShoba(){

window.location.href=
"shoba.html";

}

/* SHOW LOGIN FORM */

function showLogin(){

document.getElementById(
"loginForm"
).style.display="block";

}

/* LOGIN */

function login(){

let user =
document.getElementById(
"username"
).value;

let pass =
document.getElementById(
"password"
).value;

/* YOUR LOGIN */

let validUser =
"vspratul2004@gmail.com";

let validPass =
"Pratul123!!!";

if(user===validUser && pass===validPass){

localStorage.setItem(
"isLoggedIn",
"true"
);

window.location.href=
"pratul.html";

}

else{

document.getElementById(
"errorMsg"
).innerText=
"Invalid Username or Password";

}

}

</script>

</body>

</html>
