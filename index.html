<!DOCTYPE html>
<html>

<head>
<title>Family Provision Login</title>

<style>

/* Background */
body {
font-family: Arial, sans-serif;
margin: 0;
padding: 0;

background: linear-gradient(
135deg,
#dbeafe,
#fef9c3,
#dcfce7
);

height: 100vh;

display: flex;
justify-content: center;
align-items: center;
}

/* Login container */
.container {

background: white;

padding: 30px;

border-radius: 15px;

box-shadow:
0 5px 15px rgba(0,0,0,0.15);

text-align: center;

width: 300px;
}

/* Title */
h2 {
margin-bottom: 25px;
color: #333;
}

/* Buttons */
.login-btn {

display: block;

padding: 15px;

margin: 10px 0;

font-size: 16px;

border: none;

border-radius: 10px;

cursor: pointer;

font-weight: bold;

width: 100%;

transition: 0.3s;
}

/* Shoba button */
.shoba {
background: linear-gradient(
135deg,
#22c55e,
#16a34a
);

color: white;
}

/* Pratul button */
.pratul {
background: linear-gradient(
135deg,
#3b82f6,
#2563eb
);

color: white;
}

/* Hover effect */
.login-btn:hover {
opacity: 0.9;
}

</style>

</head>

<body>

<div class="container">

<h2>Family Provisions</h2>

<button class="login-btn shoba"
onclick="location.href='shoba.html'">

👩 Shoba Login

</button>

<button class="login-btn pratul"
onclick="location.href='pratul.html'">

👨 Pratul Login

</button>

</div>

</body>

</html>
