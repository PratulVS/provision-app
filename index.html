<!DOCTYPE html>
<html>

<head>
<title>Family Provision Login</title>

<style>

body {

font-family:'Segoe UI',sans-serif;

background: linear-gradient(
135deg,
#dbeafe,
#fef9c3,
#dcfce7
);

height:100vh;

display:flex;
justify-content:center;
align-items:center;

}

/* LOGIN BOX */

.login-box {

background:white;

padding:30px;

border-radius:15px;

width:300px;

box-shadow:
0 4px 15px rgba(0,0,0,0.1);

text-align:center;

}

input {

width:100%;

padding:10px;

margin:8px 0;

border-radius:8px;

border:1px solid #ccc;

}

button {

width:100%;

padding:12px;

margin-top:10px;

border:none;

border-radius:10px;

font-weight:bold;

cursor:pointer;

}

/* SHoba Button */

.shoba-btn {

background:#22c55e;
color:white;

}

/* Login Button */

.login-btn {

background:#3b82f6;
color:white;

}

.error {

color:red;

font-size:14px;

margin-top:5px;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Family Provisions</h2>

<!-- SHoba Login -->

<button
class="shoba-btn"
onclick="goShoba()">

👩 Shoba Dashboard

</button>

<hr style="margin:15px 0">

<!-- Pratul Login -->

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button
class="login-btn"
onclick="login()">

Login as Pratul

</button>

<p id="errorMsg" class="error"></p>

</div>

<script>

/* SHoba Redirect */

function goShoba(){

window.location.href=
"shoba.html";

}

/* LOGIN */

function login(){

let user =
document.getElementById("username").value;

let pass =
document.getElementById("password").value;

/* Credentials */

let validUser =
"vspratul2004@gmail.com";

let validPass =
"Pratul123!!!";

if(user===validUser && pass===validPass){

localStorage.setItem(
"isLoggedIn",
"true"
);

window.location.href=
"pratul.html";

}

else{

document.getElementById(
"errorMsg"
).innerText=
"Invalid Username or Password";

}

}

</script>

</body>

</html>
