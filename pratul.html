<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="style.css">

<title>Pratul Dashboard</title>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
updateDoc,
doc,
deleteDoc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAxK-JoTWUGHTZxOtE_UckLCwz-GJw4uWo",
authDomain: "family-provision.firebaseapp.com",
projectId: "family-provision",
storageBucket: "family-provision.firebasestorage.app",
messagingSenderId: "533219133266",
appId: "1:533219133266:web:6a0b1846fd969a4abb5c8b"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db=db;
window.collection=collection;
window.getDocs=getDocs;
window.updateDoc=updateDoc;
window.doc=doc;
window.deleteDoc=deleteDoc;
window.setDoc=setDoc;
window.getDoc=getDoc;

</script>

<style>

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:12px;
position:relative;
}

.new-list{
border-left:6px solid red;
}

.completed-list{
border-left:6px solid green;
}

.tick{
position:absolute;
bottom:8px;
right:10px;
color:green;
font-size:18px;
}

.delete-btn{
position:absolute;
top:8px;
right:10px;
background:red;
color:white;
border:none;
padding:5px 8px;
border-radius:6px;
cursor:pointer;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>Pratul Dashboard</h2>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<!-- MENU -->

<div id="mainMenu">

<button
class="submit-btn"
onclick="showView()">

📋 View Provision List

</button>

<br><br>

<button
class="submit-btn"
onclick="showManage()">

⚙ Add / Remove / Rename Items

</button>

</div>

<!-- VIEW LIST -->

<div id="viewSection"
class="hidden">

<button
class="logout-btn"
onclick="goHome()">

⬅ Back

</button>

<br><br>

<div id="listContainer"></div>

</div>

<!-- MANAGE ITEMS -->

<div id="manageSection"
class="hidden">

<button
class="logout-btn"
onclick="goHome()">

⬅ Back

</button>

<br><br>

<h3>Manage Items</h3>

<div id="itemsBox"></div>

<br>

<button
class="add-btn"
onclick="addItem()">

➕ Add New Item

</button>

<br><br>

<button
class="submit-btn"
onclick="saveItems()">

💾 Save Items

</button>

</div>

</div>

<script>

/* NAVIGATION */

function showView(){

document.getElementById("mainMenu").style.display="none";
document.getElementById("viewSection")
.classList.remove("hidden");

loadLists();

}

function showManage(){

document.getElementById("mainMenu").style.display="none";
document.getElementById("manageSection")
.classList.remove("hidden");

loadItems();

}

function goHome(){

location.reload();

}

/* LOAD LISTS */

async function loadLists(){

let container =
document.getElementById("listContainer");

container.innerHTML="Loading...";

let snapshot =
await getDocs(
collection(db,"provisionLists")
);

container.innerHTML="";

snapshot.forEach(docSnap=>{

let data=docSnap.data();

let card=
document.createElement("div");

card.className="card";

card.innerHTML=

`
<b>${data.time}</b>
<br>
Items: ${data.items.length}
`;

container.appendChild(card);

});

}

/* LOAD ITEMS FROM FIREBASE */

async function loadItems(){

let ref =
doc(db,"categoryItems","main");

let snap =
await getDoc(ref);

let items;

if(snap.exists()){

items = snap.data();

}else{

items = {

liquid:["Oil","Milk"],
bulk:["Rice","Wheat Flour"],
small:["Mustard","Pepper"],
packet:["Chips","Masala"],
sachet:["Shampoo"]

};

}

/* DISPLAY */

let box=
document.getElementById("itemsBox");

box.innerHTML="";

for(let category in items){

let title=
document.createElement("h4");

title.innerText=
category.toUpperCase();

box.appendChild(title);

items[category].forEach(name=>{

createRow(name,category);

});

}

}

/* CREATE ROW */

function createRow(name,category){

let box=
document.getElementById("itemsBox");

let div=
document.createElement("div");

div.className="card";

div.innerHTML=

`
<input type="text" value="${name}">

<select>

<option value="liquid"
${category==="liquid"?"selected":""}>Liquid</option>

<option value="bulk"
${category==="bulk"?"selected":""}>Bulk</option>

<option value="small"
${category==="small"?"selected":""}>Small</option>

<option value="packet"
${category==="packet"?"selected":""}>Packet</option>

<option value="sachet"
${category==="sachet"?"selected":""}>Sachet</option>

</select>

<button
onclick="removeItem(this)"
style="background:red;color:white">

❌

</button>
`;

box.appendChild(div);

}

/* ADD ITEM */

function addItem(){

createRow("","small");

}

/* REMOVE ITEM */

function removeItem(btn){

btn.parentElement.remove();

}

/* SAVE ITEMS */

async function saveItems(){

let rows =
document.querySelectorAll("#itemsBox .card");

let newItems={

liquid:[],
bulk:[],
small:[],
packet:[],
sachet:[]

};

rows.forEach(row=>{

let name=
row.querySelector("input").value.trim();

let cat=
row.querySelector("select").value;

if(name){

newItems[cat].push(name);

}

});

/* SAVE TO FIREBASE */

await setDoc(
doc(db,"categoryItems","main"),
newItems
);

alert("Items Updated Successfully!");

}

/* LOGOUT */

function logout(){

window.location.href="index.html";

}

</script>

</body>

</html>
