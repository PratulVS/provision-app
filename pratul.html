<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="style.css">

<title>Pratul Dashboard</title>

<style>

/* CARD POSITION */

.card{
position:relative;
}

/* RED NEW */

.new-list{
border-left:6px solid red;
}

/* GREEN COMPLETED */

.completed-list{
border-left:6px solid green;
}

/* DELETE BUTTON */

.delete-btn{

position:absolute;

top:8px;
right:8px;

background:red;
color:white;

border:none;

padding:4px 8px;

border-radius:6px;

cursor:pointer;

}

/* GREEN TICK */

.tick{

position:absolute;

bottom:8px;
right:10px;

font-size:20px;

color:green;

font-weight:bold;

}

/* EDIT FIELD */

.editItem{

width:75%;
padding:6px;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>Pratul Dashboard</h2>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<!-- LIST HISTORY -->

<div id="listHistory"></div>

<!-- ITEM VIEW -->

<div id="itemView"
style="display:none">

<h3 id="listTime"></h3>

<div id="items"></div>

<button
class="add-btn"
onclick="addNewItem()">

➕ Add Item

</button>

<input
type="text"
id="shopName"
placeholder="Shop Name">

<input
type="number"
id="amountPaid"
placeholder="Total Amount">

<button
class="submit-btn"
onclick="updateList()">

Update List

</button>

<button
class="submit-btn"
onclick="finishList()">

Finish Purchase

</button>

</div>

</div>

<script>

/* LOGIN CHECK */

if(
localStorage.getItem("isLoggedIn")
!=="true"
){

window.location.href="index.html";

}

/* LOAD HISTORY */

function loadHistory(){

let history =
JSON.parse(
localStorage.getItem("allLists")
)||[];

let container =
document.getElementById(
"listHistory"
);

container.innerHTML="";

/* NEWEST FIRST */

history
.slice()
.reverse()
.forEach(function(list,index){

let actualIndex =
history.length-1-index;

let card =
document.createElement("div");

card.className="card";

/* STATUS COLORS */

if(list.status==="pending"){

card.classList.add("new-list");

}

if(list.status==="completed"){

card.classList.add("completed-list");

}

/* CARD CONTENT */

card.innerHTML=

`
<b>${list.time}</b>
<br>
Items: ${list.items.length}
<br>
Shop: ${list.shop || "-"}
<br>
Amount: ₹${list.amount || "-"}
`;

/* GREEN TICK */

if(list.status==="completed"){

let tick =
document.createElement("div");

tick.className="tick";

tick.innerHTML="✔";

card.appendChild(tick);

}

/* DELETE BUTTON */

let deleteBtn =
document.createElement("button");

deleteBtn.innerText="🗑";

deleteBtn.className="delete-btn";

deleteBtn.onclick=function(e){

e.stopPropagation();

deleteList(actualIndex);

};

card.appendChild(deleteBtn);

/* OPEN LIST */

card.onclick=function(){

openList(actualIndex);

};

container.appendChild(card);

});

}

/* OPEN LIST */

function openList(index){

let history =
JSON.parse(
localStorage.getItem("allLists")
);

let list =
history[index];

window.currentEditIndex=index;

document.getElementById(
"listHistory"
).style.display="none";

document.getElementById(
"itemView"
).style.display="block";

document.getElementById(
"listTime"
).innerText=list.time;

document.getElementById(
"shopName"
).value=list.shop || "";

document.getElementById(
"amountPaid"
).value=list.amount || "";

let itemsBox =
document.getElementById("items");

itemsBox.innerHTML="";

/* LOAD ITEMS */

list.items.forEach(item=>{

let div =
document.createElement("div");

div.className="card";

div.innerHTML=

`
<input
type="text"
value="${item}"
class="editItem">

<button
onclick="removeItem(this)"
style="background:red;color:white">

❌

</button>
`;

itemsBox.appendChild(div);

});

}

/* ADD ITEM */

function addNewItem(){

let itemsBox =
document.getElementById("items");

let div =
document.createElement("div");

div.className="card";

div.innerHTML=

`
<input
type="text"
placeholder="New Item"
class="editItem">

<button
onclick="removeItem(this)"
style="background:red;color:white">

❌

</button>
`;

itemsBox.appendChild(div);

}

/* REMOVE ITEM */

function removeItem(btn){

btn.parentElement.remove();

}

/* UPDATE LIST */

function updateList(){

let history =
JSON.parse(
localStorage.getItem("allLists")
);

let inputs =
document.querySelectorAll(
".editItem"
);

let updatedItems=[];

inputs.forEach(input=>{

if(input.value.trim()!==""){

updatedItems.push(
input.value.trim()
);

}

});

/* UPDATE ITEMS */

history[
window.currentEditIndex
].items = updatedItems;

/* UPDATE SHOP */

history[
window.currentEditIndex
].shop =
document.getElementById(
"shopName"
).value;

/* UPDATE AMOUNT */

history[
window.currentEditIndex
].amount =
document.getElementById(
"amountPaid"
).value;

/* SAVE */

localStorage.setItem(
"allLists",
JSON.stringify(history)
);

alert("List Updated!");

location.reload();

}

/* FINISH LIST */

function finishList(){

let history =
JSON.parse(
localStorage.getItem("allLists")
);

history[
window.currentEditIndex
].status="completed";

history[
window.currentEditIndex
].shop =
document.getElementById(
"shopName"
).value;

history[
window.currentEditIndex
].amount =
document.getElementById(
"amountPaid"
).value;

localStorage.setItem(
"allLists",
JSON.stringify(history)
);

alert("Purchase Completed!");

location.reload();

}

/* DELETE */

function deleteList(index){

if(!confirm(
"Delete this list?"
)) return;

let history =
JSON.parse(
localStorage.getItem("allLists")
);

history.splice(index,1);

localStorage.setItem(
"allLists",
JSON.stringify(history)
);

location.reload();

}

/* LOGOUT */

function logout(){

localStorage.removeItem(
"isLoggedIn"
);

window.location.href="index.html";

}

/* LOAD */

window.onload=loadHistory;

</script>

</body>

</html>
