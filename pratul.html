<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="style.css">

<title>Pratul Dashboard</title>

</head>

<body>

<div class="container">

<div class="header">

<h2>Pratul Dashboard</h2>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<div id="listHistory"></div>

<div id="itemView"
style="display:none">

<h3 id="listTime"></h3>

<div id="items"></div>

<input
type="text"
id="shopName"
placeholder="Shop Name">

<input
type="number"
id="amountPaid"
placeholder="Total Amount">

<button
class="submit-btn"
onclick="finishList()">

Finish Purchase

</button>

</div>

</div>

<script>

/* LOGIN CHECK */

if(
localStorage.getItem("isLoggedIn")
!=="true"
){

window.location.href="index.html";

}

/* LOAD HISTORY */

function loadHistory(){

let history=
JSON.parse(
localStorage.getItem("allLists")
)||[];

let container=
document.getElementById(
"listHistory"
);

container.innerHTML="";

history
.slice()
.reverse()
.forEach(function(list,index){

let card=
document.createElement("div");

card.className="card";

card.innerHTML=

`
<b>${list.time}</b>
<br>
Items: ${list.items.length}
`;

card.onclick=function(){

openList(
history.length-1-index
);

};

container.appendChild(card);

});

}

/* OPEN LIST */

function openList(index){

let history=
JSON.parse(
localStorage.getItem("allLists")
);

let list=
history[index];

document.getElementById(
"listHistory"
).style.display="none";

document.getElementById(
"itemView"
).style.display="block";

document.getElementById(
"listTime"
).innerText=list.time;

let itemsBox=
document.getElementById(
"items"
);

itemsBox.innerHTML="";

list.items.forEach(item=>{

let div=
document.createElement("div");

div.className="card";

div.innerHTML=

`
<input type="checkbox">
${item}
`;

itemsBox.appendChild(div);

});

}

/* FINISH */

function finishList(){

let shop=
document.getElementById(
"shopName"
).value;

let amount=
document.getElementById(
"amountPaid"
).value;

let history=
JSON.parse(
localStorage.getItem("allLists")
);

for(let i=history.length-1;i>=0;i--){

if(history[i].status==="pending"){

history[i].status="completed";

history[i].shop=shop;

history[i].amount=amount;

break;

}

}

localStorage.setItem(
"allLists",
JSON.stringify(history)
);

alert("Purchase Completed!");

location.reload();

}

/* LOGOUT */

function logout(){

localStorage.removeItem(
"isLoggedIn"
);

window.location.href=
"index.html";

}

/* LOAD */

window.onload=loadHistory;

</script>

</body>

</html>
