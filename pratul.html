<!DOCTYPE html>
<html>

<head>
<title>Pratul Dashboard</title>

<style>

/* Page Background */
body {
font-family: Arial, sans-serif;
margin: 0;
padding: 20px;

/* Attractive gradient background */
background: linear-gradient(
135deg,
#dbeafe,
#fef9c3,
#dcfce7
);

min-height: 100vh;
}

/* Title */
h2 {
text-align: center;
color: #333;
margin-bottom: 20px;
}

/* List container */
#list {
list-style: none;
padding: 0;
}

/* Each list item */
li {
background: white;
padding: 14px;
margin-bottom: 12px;
border-radius: 12px;

box-shadow:
0 4px 10px rgba(0,0,0,0.1);

font-size: 16px;
}

/* Checkbox spacing */
input[type="checkbox"] {
margin-right: 10px;
}

/* Button style */
button {
padding: 14px;
font-size: 16px;

background: linear-gradient(
135deg,
#ef4444,
#dc2626
);

color: white;
border: none;
border-radius: 10px;
width: 100%;

font-weight: bold;
margin-top: 15px;
}

</style>

</head>

<body>

<h2>Pratul - Provision List</h2>

<ul id="list"></ul>

<button onclick="clearList()">
Mark Complete
</button>

<script>

/* Load saved list */
function loadList(){

let data =
JSON.parse(
localStorage.getItem("provisionList")
);

let ul =
document.getElementById("list");

/* Clear previous items */
ul.innerHTML = "";

if(data){

data.forEach(function(item){

let li =
document.createElement("li");

/* Add checkbox */
let checkbox =
document.createElement("input");

checkbox.type = "checkbox";

/* Add text */
let text =
document.createTextNode(item);

/* Add checkbox + text */
li.appendChild(checkbox);
li.appendChild(text);

ul.appendChild(li);

});

}

}

/* Clear completed list */
function clearList(){

localStorage.removeItem(
"provisionList"
);

alert("List Completed!");

location.reload();

}

/* Run when page loads */
window.onload = loadList;

</script>

</body>

</html>
