<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="style.css">

<title>Pratul Dashboard</title>

<!-- Firebase -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
updateDoc,
doc,
deleteDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* Firebase Config */

const firebaseConfig = {

apiKey: "AIzaSyAxK-JoTWUGHTZxOtE_UckLCwz-GJw4uWo",

authDomain: "family-provision.firebaseapp.com",

projectId: "family-provision",

storageBucket: "family-provision.firebasestorage.app",

messagingSenderId: "533219133266",

appId: "1:533219133266:web:6a0b1846fd969a4abb5c8b"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.db=db;
window.collection=collection;
window.getDocs=getDocs;
window.updateDoc=updateDoc;
window.doc=doc;
window.deleteDoc=deleteDoc;

</script>

<style>

/* CARD */

.card{

position:relative;

margin-bottom:12px;

padding:15px;

border-radius:12px;

background:white;

cursor:pointer;

}

/* RED NEW */

.new-list{

border-left:6px solid red;

}

/* GREEN DONE */

.completed-list{

border-left:6px solid green;

}

/* GREEN TICK */

.tick{

position:absolute;

bottom:8px;

right:10px;

font-size:18px;

color:green;

}

/* DELETE BUTTON */

.delete-btn{

position:absolute;

top:8px;

right:10px;

background:red;

color:white;

border:none;

padding:5px 8px;

border-radius:6px;

cursor:pointer;

}

.hidden{

display:none;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>Pratul Dashboard</h2>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<button
class="submit-btn"
onclick="loadLists()">

📋 View Provision Lists

</button>

<br><br>

<div id="listContainer"></div>

<div id="itemView"
class="hidden">

<h3 id="listTime"></h3>

<div id="items"></div>

<br>

<input
type="text"
id="shopName"
placeholder="Shop Name">

<br><br>

<input
type="number"
id="amountPaid"
placeholder="Total Amount">

<br><br>

<button
class="submit-btn"
onclick="finishList()">

Finish Purchase

</button>

</div>

</div>

<script>

/* LOAD LISTS FROM FIREBASE */

async function loadLists(){

let container =
document.getElementById("listContainer");

container.innerHTML="Loading...";

let querySnapshot =
await getDocs(
collection(db,"provisionLists")
);

container.innerHTML="";

querySnapshot.forEach(docSnap=>{

let data=docSnap.data();

let card=
document.createElement("div");

card.className="card";

/* STATUS */

if(data.status==="pending"){

card.classList.add("new-list");

}

if(data.status==="completed"){

card.classList.add("completed-list");

}

card.innerHTML=

`
<b>${data.time}</b>
<br>
Items: ${data.items.length}
<br>
Shop: ${data.shop || "-"}
<br>
Amount: ₹${data.amount || "-"}
`;

/* CLICK */

card.onclick=function(){

openList(
docSnap.id,
data
);

};

/* DELETE */

let delBtn=
document.createElement("button");

delBtn.innerText="🗑";

delBtn.className="delete-btn";

delBtn.onclick=function(e){

e.stopPropagation();

deleteList(docSnap.id);

};

card.appendChild(delBtn);

/* GREEN TICK */

if(data.status==="completed"){

let tick=
document.createElement("div");

tick.className="tick";

tick.innerHTML="✔";

card.appendChild(tick);

}

container.appendChild(card);

});

}

/* OPEN LIST */

function openList(id,data){

window.currentDoc=id;

document.getElementById("itemView")
.classList.remove("hidden");

document.getElementById("listTime")
.innerText=data.time;

let itemsBox=
document.getElementById("items");

itemsBox.innerHTML="";

data.items.forEach(item=>{

let div=
document.createElement("div");

div.className="card";

div.innerHTML=

`
<input type="checkbox">
${item}
`;

itemsBox.appendChild(div);

});

}

/* FINISH */

async function finishList(){

let shop=
document.getElementById("shopName").value;

let amount=
document.getElementById("amountPaid").value;

await updateDoc(
doc(db,"provisionLists",
window.currentDoc),
{

status:"completed",

shop:shop,

amount:amount

}

);

alert("Purchase Completed!");

location.reload();

}

/* DELETE */

async function deleteList(id){

if(!confirm("Delete list?")) return;

await deleteDoc(
doc(db,"provisionLists",id)
);

location.reload();

}

/* LOGOUT */

function logout(){

window.location.href="index.html";

}

</script>

</body>

</html>
