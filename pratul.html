<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="style.css">

<title>Pratul Dashboard</title>

<!-- Firebase -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
updateDoc,
doc,
deleteDoc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAxK-JoTWUGHTZxOtE_UckLCwz-GJw4uWo",
authDomain: "family-provision.firebaseapp.com",
projectId: "family-provision",
storageBucket: "family-provision.firebasestorage.app",
messagingSenderId: "533219133266",
appId: "1:533219133266:web:6a0b1846fd969a4abb5c8b"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db=db;
window.collection=collection;
window.getDocs=getDocs;
window.updateDoc=updateDoc;
window.doc=doc;
window.deleteDoc=deleteDoc;
window.setDoc=setDoc;

</script>

<style>

.card{

background:white;
padding:15px;
margin-bottom:10px;
border-radius:12px;

position:relative;
cursor:pointer;

}

.new-list{

border-left:6px solid red;

}

.completed-list{

border-left:6px solid green;

}

.tick{

position:absolute;
bottom:8px;
right:10px;

color:green;

font-size:18px;

}

.delete-btn{

position:absolute;
top:8px;
right:10px;

background:red;
color:white;

border:none;

padding:5px 8px;
border-radius:6px;

cursor:pointer;

}

.hidden{

display:none;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>Pratul Dashboard</h2>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<!-- MENU -->

<div id="mainMenu">

<button
class="submit-btn"
onclick="showView()">

📋 View Provision List

</button>

<br><br>

<button
class="submit-btn"
onclick="showManage()">

⚙ Add / Remove / Rename Items

</button>

</div>

<!-- VIEW LIST -->

<div id="viewSection"
class="hidden">

<button
class="logout-btn"
onclick="goHome()">

⬅ Back

</button>

<br><br>

<div id="listContainer"></div>

<div id="itemView"
class="hidden">

<h3 id="listTime"></h3>

<div id="items"></div>

<br>

<input
type="text"
id="shopName"
placeholder="Shop Name">

<br><br>

<input
type="number"
id="amountPaid"
placeholder="Total Amount">

<br><br>

<button
class="submit-btn"
onclick="finishList()">

Finish Purchase

</button>

</div>

</div>

<!-- MANAGE ITEMS -->

<div id="manageSection"
class="hidden">

<button
class="logout-btn"
onclick="goHome()">

⬅ Back

</button>

<br><br>

<h3>Manage Items</h3>

<div id="itemsBox"></div>

<br>

<button
class="add-btn"
onclick="addItem()">

➕ Add New Item

</button>

<br><br>

<button
class="submit-btn"
onclick="saveItems()">

💾 Save Items

</button>

</div>

</div>

<script>

/* NAVIGATION */

function showView(){

document.getElementById("mainMenu").style.display="none";

document.getElementById("viewSection")
.classList.remove("hidden");

loadLists();

}

function showManage(){

document.getElementById("mainMenu").style.display="none";

document.getElementById("manageSection")
.classList.remove("hidden");

loadItems();

}

function goHome(){

location.reload();

}

/* LOAD FIREBASE LISTS */

async function loadLists(){

let container=
document.getElementById("listContainer");

container.innerHTML="Loading...";

let snapshot=
await getDocs(
collection(db,"provisionLists")
);

container.innerHTML="";

snapshot.forEach(docSnap=>{

let data=docSnap.data();

let card=
document.createElement("div");

card.className="card";

if(data.status==="pending")
card.classList.add("new-list");

if(data.status==="completed")
card.classList.add("completed-list");

card.innerHTML=

`
<b>${data.time}</b>
<br>
Items: ${data.items.length}
<br>
Shop: ${data.shop || "-"}
<br>
Amount: ₹${data.amount || "-"}
`;

card.onclick=function(){

openList(docSnap.id,data);

};

let delBtn=
document.createElement("button");

delBtn.innerText="🗑";

delBtn.className="delete-btn";

delBtn.onclick=function(e){

e.stopPropagation();

deleteList(docSnap.id);

};

card.appendChild(delBtn);

if(data.status==="completed"){

let tick=
document.createElement("div");

tick.className="tick";

tick.innerHTML="✔";

card.appendChild(tick);

}

container.appendChild(card);

});

}

/* OPEN LIST */

function openList(id,data){

window.currentDoc=id;

document.getElementById("itemView")
.classList.remove("hidden");

document.getElementById("listTime")
.innerText=data.time;

let box=
document.getElementById("items");

box.innerHTML="";

data.items.forEach(item=>{

let div=
document.createElement("div");

div.className="card";

div.innerHTML=

`
<input type="checkbox">
${item}
`;

box.appendChild(div);

});

}

/* FINISH */

async function finishList(){

let shop=
document.getElementById("shopName").value;

let amount=
document.getElementById("amountPaid").value;

await updateDoc(
doc(db,"provisionLists",
window.currentDoc),
{

status:"completed",
shop:shop,
amount:amount

}

);

alert("Purchase Completed");

location.reload();

}

/* DELETE */

async function deleteList(id){

if(!confirm("Delete list?")) return;

await deleteDoc(
doc(db,"provisionLists",id)
);

location.reload();

}

/* MANAGE ITEMS */

function loadItems(){

let items=
JSON.parse(
localStorage.getItem("categoryItems")
)||{

liquid:["Oil","Milk"],
bulk:["Rice","Wheat Flour"],
small:["Mustard","Pepper"],
packet:["Chips","Masala"],
sachet:["Shampoo"]

};

let box=
document.getElementById("itemsBox");

box.innerHTML="";

for(let category in items){

let title=
document.createElement("h4");

title.innerText=
category.toUpperCase();

box.appendChild(title);

items[category].forEach(name=>{

let div=
document.createElement("div");

div.className="card";

div.innerHTML=

`
<input type="text" value="${name}">

<select>

<option value="liquid"
${category==="liquid"?"selected":""}>Liquid</option>

<option value="bulk"
${category==="bulk"?"selected":""}>Bulk</option>

<option value="small"
${category==="small"?"selected":""}>Small</option>

<option value="packet"
${category==="packet"?"selected":""}>Packet</option>

<option value="sachet"
${category==="sachet"?"selected":""}>Sachet</option>

</select>

<button
onclick="removeItem(this)"
style="background:red;color:white">

❌

</button>
`;

box.appendChild(div);

});

}

}

/* ADD ITEM */

function addItem(){

let box=
document.getElementById("itemsBox");

let div=
document.createElement("div");

div.className="card";

div.innerHTML=

`
<input type="text" placeholder="New Item">

<select>

<option value="liquid">Liquid</option>
<option value="bulk">Bulk</option>
<option value="small">Small</option>
<option value="packet">Packet</option>
<option value="sachet">Sachet</option>

</select>

<button
onclick="removeItem(this)"
style="background:red;color:white">

❌

</button>
`;

box.appendChild(div);

}

/* REMOVE */

function removeItem(btn){

btn.parentElement.remove();

}

/* SAVE ITEMS */

function saveItems(){

let rows=
document.querySelectorAll("#itemsBox .card");

let newItems={

liquid:[],
bulk:[],
small:[],
packet:[],
sachet:[]

};

rows.forEach(row=>{

let name=
row.querySelector("input").value;

let cat=
row.querySelector("select").value;

if(name)
newItems[cat].push(name);

});

localStorage.setItem(
"categoryItems",
JSON.stringify(newItems)
);

alert("Items Saved");

}

/* LOGOUT */

function logout(){

window.location.href="index.html";

}

</script>

</body>

</html>
