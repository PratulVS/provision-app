<!DOCTYPE html>
<html>

<head>
<title>Pratul Dashboard</title>

<style>

/* RESET */
* {
margin:0;
padding:0;
box-sizing:border-box;
}

/* BODY */

body {

font-family:'Segoe UI',sans-serif;

background: linear-gradient(
135deg,
#dbeafe,
#fef9c3,
#dcfce7
);

padding:15px;

min-height:100vh;

}

/* CONTAINER */

.container {

max-width:500px;
margin:auto;

}

/* HEADER */

.header {

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:15px;

}

/* LOGOUT */

.logout-btn {

background:#6b7280;
color:white;

border:none;

padding:8px 14px;

border-radius:8px;

cursor:pointer;

}

/* LIST CARD */

.list-card {

background:white;

padding:15px;

border-radius:12px;

margin-bottom:10px;

box-shadow:
0 4px 10px rgba(0,0,0,0.08);

cursor:pointer;

position:relative;

}

/* NEW LIST HIGHLIGHT */

.new-list {

border-left:6px solid red;

}

/* COMPLETED */

.completed {

border-left:6px solid green;

}

/* GREEN TICK */

.tick {

position:absolute;

bottom:8px;

right:10px;

font-size:20px;

color:green;

}

/* ITEMS PAGE */

.item-box {

background:white;

padding:12px;

border-radius:10px;

margin-bottom:8px;

display:flex;

align-items:center;

gap:10px;

}

/* BUTTON */

.finish-btn {

width:100%;

padding:14px;

margin-top:10px;

background:linear-gradient(
135deg,
#22c55e,
#16a34a
);

color:white;

border:none;

border-radius:10px;

font-weight:bold;

}

/* AMOUNT BOX */

.amount-box {

margin-top:10px;

display:flex;

gap:10px;

}

.amount-box input {

flex:1;

padding:8px;

border-radius:6px;

border:1px solid #ccc;

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<h2>Pratul Dashboard</h2>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<!-- LIST HISTORY -->

<div id="listHistory"></div>

<!-- ITEM VIEW -->

<div id="itemView" style="display:none">

<h3 id="listTime"></h3>

<div id="items"></div>

<!-- AMOUNT -->

<div class="amount-box">

<input
type="number"
id="amountPaid"
placeholder="Enter total amount">

</div>

<button
class="finish-btn"
onclick="finishList()">

Finish

</button>

</div>

</div>

<script>

/* LOAD LIST HISTORY */

function loadHistory(){

let history =
JSON.parse(
localStorage.getItem("allLists")
) || [];

let container =
document.getElementById(
"listHistory"
);

container.innerHTML="";

/* Latest on Top */

history.reverse().forEach(
function(list,index){

let card =
document.createElement("div");

card.className="list-card";

/* Highlight new */

if(list.status==="pending"){

card.classList.add("new-list");

}

if(list.status==="completed"){

card.classList.add("completed");

}

/* Date */

card.innerHTML=

`
<b>${list.time}</b>
<br>
Items: ${list.items.length}
`;

if(list.status==="completed"){

let tick =
document.createElement("div");

tick.className="tick";

tick.innerHTML="✔";

card.appendChild(tick);

}

/* Click open */

card.onclick=function(){

openList(index);

};

container.appendChild(card);

});

}

/* OPEN LIST */

function openList(index){

let history =
JSON.parse(
localStorage.getItem("allLists")
);

let list =
history.reverse()[index];

document.getElementById(
"listHistory"
).style.display="none";

document.getElementById(
"itemView"
).style.display="block";

document.getElementById(
"listTime"
).innerText=list.time;

let itemsBox =
document.getElementById(
"items"
);

itemsBox.innerHTML="";

list.items.forEach(function(item){

let div =
document.createElement("div");

div.className="item-box";

div.innerHTML=

`
<input type="checkbox">
${item}
`;

itemsBox.appendChild(div);

});

}

/* FINISH LIST */

function finishList(){

let amount =
document.getElementById(
"amountPaid"
).value;

let history =
JSON.parse(
localStorage.getItem("allLists")
);

history[history.length-1]
.status="completed";

history[history.length-1]
.amount=amount;

localStorage.setItem(
"allLists",
JSON.stringify(history)
);

alert("List Completed!");

location.reload();

}

/* LOGOUT */

function logout(){

window.location.href=
"index.html";

}

/* INITIAL LOAD */

window.onload=loadHistory;

</script>

</body>

</html>
