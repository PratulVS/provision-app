<!DOCTYPE html>
<html>

<head>
<title>Pratul Dashboard</title>

<style>

/* RESET */
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

/* BODY */
body {

font-family: 'Segoe UI', sans-serif;

background: linear-gradient(
135deg,
#dbeafe,
#fef9c3,
#dcfce7
);

min-height: 100vh;

padding: 15px;
}

/* MAIN CONTAINER */
.container {

max-width: 500px;

margin: auto;

}

/* HEADER */
.header {

display: flex;
justify-content: space-between;
align-items: center;

margin-bottom: 15px;

}

/* TITLE */
.header-title {

text-align: left;

}

.header-title h2 {

color: #333;

margin-bottom: 3px;

}

.header-title p {

color: #555;

font-size: 14px;

}

/* LOGOUT BUTTON */
.logout-btn {

padding: 8px 14px;

background: #6b7280;

color: white;

border: none;

border-radius: 8px;

cursor: pointer;

font-size: 14px;

}

.logout-btn:hover {

opacity: 0.9;

}

/* EMPTY MESSAGE */
.empty-message {

text-align: center;

color: #666;

margin-top: 30px;

}

/* LIST */
.list {

list-style: none;

margin-top: 10px;

}

/* ITEM CARD */
.card {

background: white;

padding: 14px;

margin-bottom: 10px;

border-radius: 12px;

box-shadow:
0 4px 10px rgba(0,0,0,0.08);

display: flex;

align-items: center;

gap: 10px;

font-size: 16px;

}

/* CHECKBOX */
input[type="checkbox"] {

transform: scale(1.2);

}

/* COMPLETE BUTTON */
.complete-btn {

width: 100%;

padding: 14px;

font-size: 16px;

margin-top: 12px;

background: linear-gradient(
135deg,
#ef4444,
#dc2626
);

color: white;

border: none;

border-radius: 10px;

font-weight: bold;

cursor: pointer;

}

.complete-btn:hover {

opacity: 0.9;

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER WITH LOGOUT -->

<div class="header">

<div class="header-title">

<h2>Pratul Dashboard</h2>

<p>Items to be purchased</p>

</div>

<button
class="logout-btn"
onclick="logout()"
>

Logout

</button>

</div>

<!-- LIST -->

<ul id="list" class="list"></ul>

<!-- EMPTY MESSAGE -->

<div id="emptyMsg"
class="empty-message">

No items added yet

</div>

<!-- COMPLETE BUTTON -->

<button
class="complete-btn"
onclick="clearList()"
>

Mark Complete

</button>

</div>

<script>

/* LOAD LIST */

function loadList(){

let data =
JSON.parse(
localStorage.getItem("provisionList")
);

let ul =
document.getElementById("list");

let emptyMsg =
document.getElementById("emptyMsg");

ul.innerHTML = "";

if(data && data.length > 0){

emptyMsg.style.display = "none";

data.forEach(function(item){

let li =
document.createElement("li");

li.className = "card";

/* Checkbox */

let checkbox =
document.createElement("input");

checkbox.type = "checkbox";

/* Text */

let text =
document.createTextNode(item);

/* Append */

li.appendChild(checkbox);

li.appendChild(text);

ul.appendChild(li);

});

}

else {

emptyMsg.style.display = "block";

}

}

/* CLEAR LIST */

function clearList(){

localStorage.removeItem(
"provisionList"
);

alert("List Completed!");

location.reload();

}

/* LOGOUT FUNCTION */

function logout(){

window.location.href =
"index.html";

}

/* LOAD ON START */

window.onload = loadList;

</script>

</body>

</html>
