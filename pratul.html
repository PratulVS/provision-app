<!DOCTYPE html>
<html>
<head>
<title>Shoba Provision List</title>

<style>

body {
font-family: Arial;
margin: 20px;
background: #f5f5f5;
}

.card {
background: white;
padding: 15px;
margin-bottom: 10px;
border-radius: 10px;
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

button {
padding: 12px;
font-size: 16px;
background: green;
color: white;
border: none;
border-radius: 8px;
width: 100%;
}

select {
margin-left: 10px;
padding: 5px;
}

</style>

</head>

<body>

<h2>Shoba - Provision List</h2>

<div class="card">
<input type="checkbox" value="Rice"> Rice

<select id="Rice">
<option>250 g</option>
<option>500 g</option>
<option>1 kg</option>
<option>2 kg</option>
<option>5 kg</option>
</select>
</div>

<div class="card">
<input type="checkbox" value="Oil"> Oil

<select id="Oil">
<option>250 ml</option>
<option>500 ml</option>
<option>1 L</option>
<option>2 L</option>
<option>5 L</option>
</select>
</div>

<div class="card">
<input type="checkbox" value="Sugar"> Sugar

<select id="Sugar">
<option>250 g</option>
<option>500 g</option>
<option>1 kg</option>
<option>2 kg</option>
<option>5 kg</option>
</select>
</div>

<div class="card">
<input type="checkbox" value="Milk"> Milk

<select id="Milk">
<option>250 ml</option>
<option>500 ml</option>
<option>1 L</option>
<option>2 L</option>
</select>
</div>

<br>

<button onclick="submitList()">
Submit List
</button>

<script>

function submitList(){

let items =
document.querySelectorAll(
'input[type="checkbox"]:checked'
);

let list = [];

items.forEach(function(item){

let name = item.value;

let qty =
document.getElementById(name).value;

list.push(name + " - " + qty);

});

localStorage.setItem(
"provisionList",
JSON.stringify(list)
);

alert("List Submitted Successfully!");

}

</script>

</body>
</html>
