<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="style.css">

<title>Pratul Dashboard</title>

<style>

/* STATUS COLORS */

.new-list{
border-left:6px solid red;
}

.completed-list{
border-left:6px solid green;
}

.tick{
position:absolute;
bottom:8px;
right:10px;
color:green;
font-size:20px;
}

.card{
position:relative;
margin-bottom:10px;
padding:10px;
}

/* HIDE SECTIONS */

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>Pratul Dashboard</h2>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<!-- MAIN MENU -->

<div id="mainMenu">

<button
class="submit-btn"
onclick="showViewList()">

📋 View Provision List

</button>

<br><br>

<button
class="submit-btn"
onclick="showManageItems()">

⚙ Add / Remove / Rename Items

</button>

</div>

<!-- VIEW LIST SECTION -->

<div id="viewSection"
class="hidden">

<button
class="logout-btn"
onclick="goHome()">

⬅ Back

</button>

<br><br>

<div id="listHistory"></div>

</div>

<!-- MANAGE ITEMS SECTION -->

<div id="manageSection"
class="hidden">

<button
class="logout-btn"
onclick="goHome()">

⬅ Back

</button>

<br><br>

<h3>Manage Items</h3>

<div id="itemsBox"></div>

<br>

<button
class="add-btn"
onclick="addItem()">

➕ Add New Item

</button>

<br><br>

<button
class="submit-btn"
onclick="saveItems()">

💾 Save Changes

</button>

</div>

</div>

<script>

/* LOGIN CHECK */

if(
localStorage.getItem("isLoggedIn")
!=="true"
){

window.location.href="index.html";

}

/* NAVIGATION */

function showViewList(){

document.getElementById("mainMenu").style.display="none";

document.getElementById("viewSection")
.classList.remove("hidden");

loadHistory();

}

function showManageItems(){

document.getElementById("mainMenu").style.display="none";

document.getElementById("manageSection")
.classList.remove("hidden");

loadItems();

}

function goHome(){

document.getElementById("mainMenu").style.display="block";

document.getElementById("viewSection")
.classList.add("hidden");

document.getElementById("manageSection")
.classList.add("hidden");

}

/* LOAD LIST HISTORY */

function loadHistory(){

let history=
JSON.parse(
localStorage.getItem("allLists")
)||[];

let container=
document.getElementById("listHistory");

container.innerHTML="";

/* NEWEST FIRST */

history
.slice()
.reverse()
.forEach(function(list){

let card=
document.createElement("div");

card.className="card";

/* STATUS */

if(list.status==="pending"){

card.classList.add("new-list");

}

if(list.status==="completed"){

card.classList.add("completed-list");

}

/* CONTENT */

card.innerHTML=

`
<b>${list.time}</b>
<br>
Items: ${list.items.length}
<br>
Shop: ${list.shop || "-"}
<br>
Amount: ₹${list.amount || "-"}
`;

/* GREEN TICK */

if(list.status==="completed"){

let tick=
document.createElement("div");

tick.className="tick";

tick.innerHTML="✔";

card.appendChild(tick);

}

container.appendChild(card);

});

}

/* LOAD ITEMS WITH CATEGORY */

function loadItems(){

let items=
JSON.parse(
localStorage.getItem("categoryItems")
)||{

liquid:["Oil","Milk"],

bulk:["Rice","Wheat Flour"],

small:["Mustard","Pepper"],

packet:["Chips","Masala"],

sachet:["Shampoo"]

};

let box=
document.getElementById("itemsBox");

box.innerHTML="";

/* DISPLAY CATEGORY ITEMS */

for(let category in items){

let title=
document.createElement("h4");

title.innerText=
category.toUpperCase();

box.appendChild(title);

items[category].forEach(name=>{

let div=
document.createElement("div");

div.className="card";

div.innerHTML=

`
<input
type="text"
value="${name}">

<select>

<option value="liquid"
${category==="liquid"?"selected":""}>

Liquids

</option>

<option value="bulk"
${category==="bulk"?"selected":""}>

Bulk

</option>

<option value="small"
${category==="small"?"selected":""}>

Small

</option>

<option value="packet"
${category==="packet"?"selected":""}>

Packet

</option>

<option value="sachet"
${category==="sachet"?"selected":""}>

Sachet

</option>

</select>

<button
onclick="removeItem(this)"
style="background:red;color:white">

❌

</button>
`;

box.appendChild(div);

});

}

}

/* ADD NEW ITEM WITH CATEGORY */

function addItem(){

let box=
document.getElementById("itemsBox");

let div=
document.createElement("div");

div.className="card";

div.innerHTML=

`
<input
type="text"
placeholder="New Item">

<select>

<option value="liquid">Liquids</option>

<option value="bulk">Bulk</option>

<option value="small">Small</option>

<option value="packet">Packet</option>

<option value="sachet">Sachet</option>

</select>

<button
onclick="removeItem(this)"
style="background:red;color:white">

❌

</button>
`;

box.appendChild(div);

}

/* REMOVE ITEM */

function removeItem(btn){

btn.parentElement.remove();

}

/* SAVE UPDATED ITEMS */

function saveItems(){

let rows=
document.querySelectorAll("#itemsBox .card");

let newItems={

liquid:[],

bulk:[],

small:[],

packet:[],

sachet:[]

};

rows.forEach(row=>{

let name=
row.querySelector("input").value.trim();

let category=
row.querySelector("select").value;

if(name!==""){

newItems[category].push(name);

}

});

localStorage.setItem(
"categoryItems",
JSON.stringify(newItems)
);

alert("Items Updated Successfully!");

}

/* LOGOUT */

function logout(){

localStorage.removeItem("isLoggedIn");

window.location.href="index.html";

}

</script>

</body>

</html>
