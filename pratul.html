<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="style.css">

<title>Pratul Dashboard</title>

<style>

/* CARD */

.card{

position:relative;

margin-bottom:12px;

padding:15px;

border-radius:12px;

background:white;

cursor:pointer;

}

/* RED NEW */

.new-list{

border-left:6px solid red;

}

/* GREEN DONE */

.completed-list{

border-left:6px solid green;

}

/* GREEN TICK */

.tick{

position:absolute;

bottom:8px;

right:10px;

font-size:18px;

color:green;

}

/* DELETE BUTTON */

.delete-btn{

position:absolute;

top:8px;

right:10px;

background:red;

color:white;

border:none;

padding:5px 8px;

border-radius:6px;

cursor:pointer;

}

/* HIDDEN */

.hidden{

display:none;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>Pratul Dashboard</h2>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<!-- MAIN MENU -->

<div id="mainMenu">

<button
class="submit-btn"
onclick="showViewList()">

📋 View Provision List

</button>

<br><br>

<button
class="submit-btn"
onclick="showManageItems()">

⚙ Add / Remove / Rename Items

</button>

</div>

<!-- VIEW LIST SECTION -->

<div id="viewSection"
class="hidden">

<button
class="logout-btn"
onclick="goHome()">

⬅ Back

</button>

<br><br>

<div id="listHistory"></div>

<!-- ITEM VIEW -->

<div id="itemView"
class="hidden">

<h3 id="listTime"></h3>

<div id="items"></div>

<br>

<input
type="text"
id="shopName"
placeholder="Shop Name">

<br><br>

<input
type="number"
id="amountPaid"
placeholder="Total Amount">

<br><br>

<button
class="submit-btn"
onclick="finishList()">

Finish Purchase

</button>

</div>

</div>

<!-- MANAGE ITEMS SECTION -->

<div id="manageSection"
class="hidden">

<button
class="logout-btn"
onclick="goHome()">

⬅ Back

</button>

<br><br>

<h3>Manage Items</h3>

<div id="itemsBox"></div>

<br>

<button
class="add-btn"
onclick="addItem()">

➕ Add New Item

</button>

<br><br>

<button
class="submit-btn"
onclick="saveItems()">

💾 Save Changes

</button>

</div>

</div>

<script>

/* LOGIN CHECK */

if(
localStorage.getItem("isLoggedIn")
!=="true"
){

window.location.href="index.html";

}

/* NAVIGATION */

function showViewList(){

document.getElementById("mainMenu").style.display="none";

document.getElementById("viewSection")
.classList.remove("hidden");

loadHistory();

}

function showManageItems(){

document.getElementById("mainMenu").style.display="none";

document.getElementById("manageSection")
.classList.remove("hidden");

loadItems();

}

function goHome(){

location.reload();

}

/* LOAD LIST HISTORY */

function loadHistory(){

let history=
JSON.parse(
localStorage.getItem("allLists")
)||[];

let container=
document.getElementById("listHistory");

container.innerHTML="";

/* NEWEST FIRST */

history
.slice()
.reverse()
.forEach(function(list,index){

let actualIndex=
history.length-1-index;

let card=
document.createElement("div");

card.className="card";

/* STATUS */

if(list.status==="pending"){

card.classList.add("new-list");

}

if(list.status==="completed"){

card.classList.add("completed-list");

}

/* CARD CONTENT */

card.innerHTML=

`
<b>${list.time}</b>

<br>

Items: ${list.items.length}

<br>

Shop: ${list.shop || "-"}

<br>

Amount: ₹${list.amount || "-"}
`;

/* CLICK OPEN LIST */

card.onclick=function(){

openList(actualIndex);

};

/* DELETE BUTTON */

let deleteBtn=
document.createElement("button");

deleteBtn.innerText="🗑";

deleteBtn.className="delete-btn";

deleteBtn.onclick=function(e){

e.stopPropagation();

deleteList(actualIndex);

};

card.appendChild(deleteBtn);

/* GREEN TICK */

if(list.status==="completed"){

let tick=
document.createElement("div");

tick.className="tick";

tick.innerHTML="✔";

card.appendChild(tick);

}

container.appendChild(card);

});

}

/* OPEN LIST */

function openList(index){

let history=
JSON.parse(
localStorage.getItem("allLists")
);

let list=
history[index];

window.currentIndex=index;

/* SHOW ITEM VIEW */

document.getElementById("itemView")
.classList.remove("hidden");

document.getElementById("listTime")
.innerText=list.time;

/* LOAD SHOP */

document.getElementById("shopName")
.value=list.shop || "";

document.getElementById("amountPaid")
.value=list.amount || "";

/* LOAD ITEMS */

let itemsBox=
document.getElementById("items");

itemsBox.innerHTML="";

list.items.forEach(item=>{

let div=
document.createElement("div");

div.className="card";

div.innerHTML=

`
<input type="checkbox">

${item}
`;

itemsBox.appendChild(div);

});

}

/* FINISH PURCHASE */

function finishList(){

let history=
JSON.parse(
localStorage.getItem("allLists")
);

history[window.currentIndex]
.status="completed";

history[window.currentIndex]
.shop=
document.getElementById("shopName").value;

history[window.currentIndex]
.amount=
document.getElementById("amountPaid").value;

localStorage.setItem(
"allLists",
JSON.stringify(history)
);

alert("Purchase Completed!");

location.reload();

}

/* DELETE LIST */

function deleteList(index){

if(!confirm("Delete this list?")) return;

let history=
JSON.parse(
localStorage.getItem("allLists")
);

history.splice(index,1);

localStorage.setItem(
"allLists",
JSON.stringify(history)
);

location.reload();

}

/* LOAD ITEMS */

function loadItems(){

let items=
JSON.parse(
localStorage.getItem("categoryItems")
)||{

liquid:["Oil","Milk"],

bulk:["Rice","Wheat Flour"],

small:["Mustard","Pepper"],

packet:["Chips","Masala"],

sachet:["Shampoo"]

};

let box=
document.getElementById("itemsBox");

box.innerHTML="";

for(let category in items){

let title=
document.createElement("h4");

title.innerText=category.toUpperCase();

box.appendChild(title);

items[category].forEach(name=>{

let div=
document.createElement("div");

div.className="card";

div.innerHTML=

`
<input type="text" value="${name}">

<select>

<option value="liquid"
${category==="liquid"?"selected":""}>Liquids</option>

<option value="bulk"
${category==="bulk"?"selected":""}>Bulk</option>

<option value="small"
${category==="small"?"selected":""}>Small</option>

<option value="packet"
${category==="packet"?"selected":""}>Packet</option>

<option value="sachet"
${category==="sachet"?"selected":""}>Sachet</option>

</select>

<button
onclick="removeItem(this)"
style="background:red;color:white">

❌

</button>
`;

box.appendChild(div);

});

}

}

/* ADD ITEM */

function addItem(){

let box=
document.getElementById("itemsBox");

let div=
document.createElement("div");

div.className="card";

div.innerHTML=

`
<input type="text" placeholder="New Item">

<select>

<option value="liquid">Liquids</option>

<option value="bulk">Bulk</option>

<option value="small">Small</option>

<option value="packet">Packet</option>

<option value="sachet">Sachet</option>

</select>

<button
onclick="removeItem(this)"
style="background:red;color:white">

❌

</button>
`;

box.appendChild(div);

}

/* REMOVE ITEM */

function removeItem(btn){

btn.parentElement.remove();

}

/* SAVE ITEMS */

function saveItems(){

let rows=
document.querySelectorAll("#itemsBox .card");

let newItems={

liquid:[],

bulk:[],

small:[],

packet:[],

sachet:[]

};

rows.forEach(row=>{

let name=
row.querySelector("input").value.trim();

let category=
row.querySelector("select").value;

if(name!==""){

newItems[category].push(name);

}

});

localStorage.setItem(
"categoryItems",
JSON.stringify(newItems)
);

alert("Items Updated Successfully!");

}

/* LOGOUT */

function logout(){

localStorage.removeItem("isLoggedIn");

window.location.href="index.html";

}

</script>

</body>

</html>
