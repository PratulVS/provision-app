<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="style.css">

<title>Pratul Dashboard</title>

<style>

/* CARD POSITION FIX */

.card{
position:relative;
}

/* RED NEW LIST */

.new-list{

border-left:6px solid red;

}

/* GREEN COMPLETED */

.completed-list{

border-left:6px solid green;

}

/* DELETE BUTTON */

.delete-btn{

position:absolute;

top:8px;
right:8px;

background:red;
color:white;

border:none;

padding:4px 8px;

border-radius:6px;

cursor:pointer;

}

/* GREEN TICK */

.tick{

position:absolute;

bottom:8px;
right:10px;

font-size:20px;

color:green;

font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>Pratul Dashboard</h2>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<!-- LIST HISTORY -->

<div id="listHistory"></div>

<!-- ITEM VIEW -->

<div id="itemView"
style="display:none">

<h3 id="listTime"></h3>

<div id="items"></div>

<input
type="text"
id="shopName"
placeholder="Shop Name">

<input
type="number"
id="amountPaid"
placeholder="Total Amount">

<button
class="submit-btn"
onclick="finishList()">

Finish Purchase

</button>

</div>

</div>

<script>

/* LOGIN CHECK */

if(
localStorage.getItem("isLoggedIn")
!=="true"
){

window.location.href="index.html";

}

/* LOAD LIST HISTORY */

function loadHistory(){

let history =
JSON.parse(
localStorage.getItem("allLists")
)||[];

let container =
document.getElementById(
"listHistory"
);

container.innerHTML="";

/* NEWEST FIRST */

history
.slice()
.reverse()
.forEach(function(list,index){

let actualIndex =
history.length-1-index;

let card =
document.createElement("div");

card.className="card";

/* RED FOR NEW */

if(list.status==="pending"){

card.classList.add(
"new-list"
);

}

/* GREEN FOR COMPLETED */

if(list.status==="completed"){

card.classList.add(
"completed-list"
);

}

/* CARD CONTENT */

card.innerHTML=

`
<b>${list.time}</b>
<br>
Items: ${list.items.length}
<br>
Shop: ${list.shop || "-"}
<br>
Amount: ₹${list.amount || "-"}
`;

/* GREEN TICK */

if(list.status==="completed"){

let tick =
document.createElement("div");

tick.className="tick";

tick.innerHTML="✔";

card.appendChild(tick);

}

/* DELETE BUTTON */

let deleteBtn =
document.createElement("button");

deleteBtn.innerText="🗑";

deleteBtn.className="delete-btn";

deleteBtn.onclick=function(e){

e.stopPropagation();

deleteList(actualIndex);

};

card.appendChild(deleteBtn);

/* OPEN LIST */

card.onclick=function(){

openList(actualIndex);

};

container.appendChild(card);

});

}

/* OPEN LIST */

function openList(index){

let history =
JSON.parse(
localStorage.getItem("allLists")
);

let list =
history[index];

document.getElementById(
"listHistory"
).style.display="none";

document.getElementById(
"itemView"
).style.display="block";

document.getElementById(
"listTime"
).innerText=list.time;

let itemsBox =
document.getElementById(
"items"
);

itemsBox.innerHTML="";

/* DISPLAY ITEMS */

list.items.forEach(item=>{

let div =
document.createElement("div");

div.className="card";

div.innerHTML=

`
<input type="checkbox">
${item}
`;

itemsBox.appendChild(div);

});

}

/* FINISH LIST */

function finishList(){

let shop =
document.getElementById(
"shopName"
).value;

let amount =
document.getElementById(
"amountPaid"
).value;

let history =
JSON.parse(
localStorage.getItem("allLists")
);

/* FIND LAST PENDING */

for(let i=history.length-1;i>=0;i--){

if(history[i].status==="pending"){

history[i].status="completed";

history[i].shop=shop;

history[i].amount=amount;

break;

}

}

localStorage.setItem(
"allLists",
JSON.stringify(history)
);

alert("Purchase Completed!");

location.reload();

}

/* DELETE LIST */

function deleteList(index){

if(!confirm(
"Delete this list?"
)) return;

let history =
JSON.parse(
localStorage.getItem("allLists")
);

history.splice(index,1);

localStorage.setItem(
"allLists",
JSON.stringify(history)
);

location.reload();

}

/* LOGOUT */

function logout(){

localStorage.removeItem(
"isLoggedIn"
);

window.location.href="index.html";

}

/* INITIAL LOAD */

window.onload=loadHistory;

</script>

</body>

</html>
