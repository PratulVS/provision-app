<!DOCTYPE html>
<html>
<head>
<title>Shoba Provision List</title>

<style>

body {
font-family: Arial, sans-serif;
margin: 0;
padding: 20px;

/* Attractive gradient background */
background: linear-gradient(
135deg,
#dbeafe,
#fef9c3,
#dcfce7
);

min-height: 100vh;
}

h2 {
text-align: center;
color: #333;
margin-bottom: 20px;
}

/* Card styling */
.card {
background: white;
padding: 15px;
margin-bottom: 12px;
border-radius: 12px;

box-shadow:
0 4px 10px rgba(0,0,0,0.1);
}

/* Button styling */
button {
padding: 14px;
font-size: 16px;

background: linear-gradient(
135deg,
#22c55e,
#16a34a
);

color: white;
border: none;
border-radius: 10px;
width: 100%;

font-weight: bold;
}

/* Dropdown */
select {
margin-left: 10px;
padding: 6px;
border-radius: 6px;
border: 1px solid #ccc;
}

/* Checkbox spacing */
input[type="checkbox"] {
margin-right: 8px;
}

</style>
</head>

<body>

<h2>Shoba - Provision List</h2>

<div class="card">
<input type="checkbox" value="Rice"> Rice

<select id="Rice">
<option>250 g</option>
<option>500 g</option>
<option>1 kg</option>
<option>2 kg</option>
<option>5 kg</option>
</select>
</div>

<div class="card">
<input type="checkbox" value="Oil"> Oil

<select id="Oil">
<option>250 ml</option>
<option>500 ml</option>
<option>1 L</option>
<option>2 L</option>
<option>5 L</option>
</select>
</div>

<div class="card">
<input type="checkbox" value="Sugar"> Sugar

<select id="Sugar">
<option>250 g</option>
<option>500 g</option>
<option>1 kg</option>
<option>2 kg</option>
<option>5 kg</option>
</select>
</div>

<div class="card">
<input type="checkbox" value="Milk"> Milk

<select id="Milk">
<option>250 ml</option>
<option>500 ml</option>
<option>1 L</option>
<option>2 L</option>
</select>
</div>

<br>

<button onclick="submitList()">
Submit List
</button>

<script>

function submitList(){

let items =
document.querySelectorAll(
'input[type="checkbox"]:checked'
);

let list = [];

items.forEach(function(item){

let name = item.value;

let qty =
document.getElementById(name).value;

list.push(name + " - " + qty);

});

localStorage.setItem(
"provisionList",
JSON.stringify(list)
);

alert("List Submitted Successfully!");

}

</script>

</body>
</html>
