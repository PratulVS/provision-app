<!DOCTYPE html>
<html>

<head>
<title>Shoba Provision List</title>

<style>

/* RESET */
* {
margin:0;
padding:0;
box-sizing:border-box;
}

/* BODY */

body {

font-family:'Segoe UI',sans-serif;

background: linear-gradient(
135deg,
#dbeafe,
#fef9c3,
#dcfce7
);

padding:15px;

min-height:100vh;

}

/* CONTAINER */

.container {

max-width:500px;
margin:auto;

}

/* HEADER */

.header {

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:15px;

}

/* LOGOUT */

.logout-btn {

background:#6b7280;
color:white;

border:none;

padding:8px 14px;

border-radius:8px;

cursor:pointer;

}

/* SEARCH */

.search-box {

width:100%;

padding:12px;

border-radius:10px;

border:1px solid #ccc;

font-size:16px;

margin-bottom:15px;

background:white;

}

/* CARD */

.card {

background:white;

padding:14px;

margin-bottom:10px;

border-radius:12px;

box-shadow:
0 4px 10px rgba(0,0,0,0.08);

display:flex;

justify-content:space-between;

align-items:center;

}

/* LEFT */

.item-left {

display:flex;

align-items:center;

gap:10px;

font-size:16px;

}

/* DROPDOWN */

select {

padding:6px;

border-radius:6px;

border:1px solid #ccc;

}

/* COUNT DISPLAY */

.count-box {

text-align:center;

margin-bottom:10px;

font-weight:bold;

color:#333;

}

/* CUSTOM ITEM */

.custom-box {

display:flex;

gap:8px;

background:white;

padding:12px;

border-radius:12px;

margin-bottom:12px;

box-shadow:
0 4px 10px rgba(0,0,0,0.08);

}

.custom-box input {

flex:1;

padding:8px;

border-radius:6px;

border:1px solid #ccc;

}

/* ADD BUTTON */

.add-btn {

background:#3b82f6;

color:white;

border:none;

padding:8px 12px;

border-radius:8px;

cursor:pointer;

}

/* SUBMIT */

.submit-btn {

width:100%;

padding:14px;

font-size:16px;

margin-top:10px;

background:linear-gradient(
135deg,
#22c55e,
#16a34a
);

color:white;

border:none;

border-radius:10px;

font-weight:bold;

cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<h2>Shoba Dashboard</h2>

<button class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<!-- SEARCH -->

<input
type="text"
id="searchInput"
class="search-box"
placeholder="🔍 Search items..."
onkeyup="searchItems()"
>

<!-- ITEM COUNT -->

<div class="count-box">

Items Selected: <span id="itemCount">0</span>

</div>

<!-- CUSTOM ITEM -->

<div class="custom-box">

<input
type="text"
id="customItem"
placeholder="Add new item"
>

<select id="customQty">

<option>1 piece</option>
<option>2 pieces</option>
<option>5 pieces</option>
<option>10 pieces</option>

<option>250 g</option>
<option>500 g</option>
<option>1 kg</option>

<option>250 ml</option>
<option>500 ml</option>
<option>1 L</option>

</select>

<button
class="add-btn"
onclick="addCustomItem()">

Add

</button>

</div>

<!-- ITEMS -->

<div id="itemContainer"></div>

<button
class="submit-btn"
onclick="submitList()">

Submit List

</button>

</div>

<script>

/* LOAD ITEMS */

function loadItems(){

let savedItems =
JSON.parse(
localStorage.getItem("savedItems")
) || [

"Rice",
"Oil",
"Sugar",
"Milk"

];

let container =
document.getElementById(
"itemContainer"
);

container.innerHTML="";

savedItems.forEach(function(name){

let card =
document.createElement("div");

card.className="card item";

card.innerHTML=

`
<div class="item-left">

<input type="checkbox"
value="${name}"
onclick="updateCount();resetSearch()">

<span>${name}</span>

</div>

<select id="${name}">

<option>1 piece</option>
<option>2 pieces</option>
<option>5 pieces</option>

<option>250 g</option>
<option>500 g</option>
<option>1 kg</option>

<option>250 ml</option>
<option>500 ml</option>
<option>1 L</option>

</select>
`;

container.appendChild(card);

});

}

/* SEARCH */

function searchItems(){

let input =
document.getElementById("searchInput");

let filter =
input.value.toLowerCase();

let items =
document.getElementsByClassName("item");

for(let i=0;i<items.length;i++){

let text =
items[i].innerText.toLowerCase();

items[i].style.display =
text.includes(filter) ? "" : "none";

}

}

/* RESET SEARCH */

function resetSearch(){

document.getElementById(
"searchInput"
).value="";

searchItems();

}

/* UPDATE COUNT */

function updateCount(){

let count =
document.querySelectorAll(
'input[type="checkbox"]:checked'
).length;

document.getElementById(
"itemCount"
).innerText=count;

}

/* ADD CUSTOM ITEM */

function addCustomItem(){

let name =
document.getElementById(
"customItem"
).value.trim();

if(name==="") return;

let savedItems =
JSON.parse(
localStorage.getItem("savedItems")
) || [];

if(!savedItems.includes(name)){

savedItems.push(name);

localStorage.setItem(
"savedItems",
JSON.stringify(savedItems)
);

}

document.getElementById(
"customItem"
).value="";

loadItems();

}

/* SUBMIT */

function submitList(){

let checked =
document.querySelectorAll(
'input[type="checkbox"]:checked'
);

let list=[];

checked.forEach(function(item){

let name=item.value;

let qty=
document.getElementById(name).value;

list.push(name+" - "+qty);

});

let history =
JSON.parse(
localStorage.getItem("allLists")
) || [];

let now=new Date();

let time=
now.toLocaleString();

history.push({

time:time,

items:list,

status:"pending",

amount:""

});

localStorage.setItem(
"allLists",
JSON.stringify(history)
);

/* AUTO LOGOUT */

window.location.href="index.html";

}

/* LOGOUT */

function logout(){

window.location.href="index.html";

}

/* INITIAL LOAD */

window.onload=loadItems;

</script>

</body>

</html>
