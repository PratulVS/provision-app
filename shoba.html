<!DOCTYPE html>
<html>

<head>
<title>Shoba Provision List</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* BODY */

body{

font-family:'Segoe UI',sans-serif;

background:linear-gradient(
135deg,
#dbeafe,
#fef9c3,
#dcfce7
);

padding:15px;

}

/* CONTAINER */

.container{
max-width:500px;
margin:auto;
}

/* HEADER */

.header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:15px;
}

/* LOGOUT */

.logout-btn{

background:#6b7280;
color:white;

border:none;

padding:8px 14px;

border-radius:8px;

cursor:pointer;
}

/* SEARCH */

.search-box{

width:100%;
padding:12px;

border-radius:10px;

border:1px solid #ccc;

margin-bottom:12px;

}

/* CATEGORY */

.category{

font-weight:bold;

margin-top:15px;

color:#333;

}

/* CARD */

.card{

background:white;

padding:14px;

margin-bottom:10px;

border-radius:12px;

box-shadow:
0 4px 10px rgba(0,0,0,0.08);

display:flex;

justify-content:space-between;

align-items:center;
}

/* SUBMIT */

.submit-btn{

width:100%;

padding:14px;

margin-top:10px;

background:linear-gradient(
135deg,
#22c55e,
#16a34a
);

color:white;

border:none;

border-radius:10px;

font-weight:bold;

cursor:pointer;

}

/* CUSTOM ITEM */

.custom-box{

background:white;

padding:12px;

border-radius:12px;

margin-bottom:12px;

display:flex;
gap:6px;

}

.custom-box input,
.custom-box select{

padding:8px;
border-radius:6px;
border:1px solid #ccc;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>Shoba Dashboard</h2>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<input
type="text"
id="searchInput"
class="search-box"
placeholder="🔍 Search items"
onkeyup="searchItems()"
>

<!-- CUSTOM ITEM -->

<div class="custom-box">

<input
type="text"
id="customItem"
placeholder="New Item Name">

<select id="customCategory">

<option value="liquid">Liquid</option>

<option value="bulk">Bulk</option>

<option value="small">Small</option>

<option value="packet">Packet</option>

<option value="sachet">Sachet</option>

</select>

<button onclick="addCustomItem()">
Add
</button>

</div>

<!-- LIQUIDS -->

<div class="category">
Liquids
</div>

<div id="liquidList"></div>

<!-- BULK -->

<div class="category">
Bulk Items
</div>

<div id="bulkList"></div>

<!-- SMALL -->

<div class="category">
Small Items
</div>

<div id="smallList"></div>

<!-- PACKET -->

<div class="category">
Packet Foods
</div>

<div id="packetList"></div>

<!-- SACHET -->

<div class="category">
Sachets
</div>

<div id="sachetList"></div>

<button
class="submit-btn"
onclick="submitList()">

Submit List

</button>

</div>

<script>

/* CATEGORY QUANTITIES */

const quantities={

liquid:[
"250 ml",
"500 ml",
"750 ml",
"1 L",
"1.5 L",
"2 L"
],

bulk:[
"250 g",
"500 g",
"750 g",
"1 kg",
"1.5 kg",
"2 kg"
],

small:[
"50 g",
"100 g",
"250 g"
],

packet:[
"1 packet",
"2 packets",
"3 packets",
"50 g",
"100 g"
],

sachet:[
"1 sachet",
"2 sachets",
"3 sachets"
]

};

/* DEFAULT ITEMS */

let items={

liquid:["Oil","Milk"],

bulk:["Rice","Wheat Flour"],

small:["Mustard","Pepper"],

packet:["Chips","Masala"],

sachet:["Shampoo"]

};

/* LOAD ITEMS */

function loadItems(){

for(let category in items){

let container=
document.getElementById(
category+"List"
);

container.innerHTML="";

items[category].forEach(name=>{

let card=
document.createElement("div");

card.className="card item";

let selectOptions="";

quantities[category].forEach(q=>{

selectOptions+=
`<option>${q}</option>`;

});

card.innerHTML=

`
<div>

<input type="checkbox"
value="${name}">

${name}

</div>

<select id="${name}">

${selectOptions}

</select>
`;

container.appendChild(card);

});

}

}

/* ADD CUSTOM ITEM */

function addCustomItem(){

let name=
document.getElementById(
"customItem"
).value;

let category=
document.getElementById(
"customCategory"
).value;

if(name==="") return;

items[category].push(name);

localStorage.setItem(
"categoryItems",
JSON.stringify(items)
);

loadItems();

document.getElementById(
"customItem"
).value="";

}

/* SEARCH */

function searchItems(){

let filter=
document.getElementById(
"searchInput"
).value.toLowerCase();

let itemsList=
document.getElementsByClassName(
"item"
);

for(let i=0;i<itemsList.length;i++){

let text=
itemsList[i].innerText.toLowerCase();

itemsList[i].style.display=
text.includes(filter)?"":"none";

}

}

/* SUBMIT */

function submitList(){

let checked=
document.querySelectorAll(
'input[type="checkbox"]:checked'
);

let list=[];

checked.forEach(item=>{

let name=item.value;

let qty=
document.getElementById(name).value;

list.push(name+" - "+qty);

});

let history=
JSON.parse(
localStorage.getItem("allLists")
)||[];

let now=new Date();

history.push({

time:now.toLocaleString(),

items:list,

status:"pending"

});

localStorage.setItem(
"allLists",
JSON.stringify(history)
);

window.location.href="index.html";

}

/* LOAD SAVED ITEMS */

let saved=
localStorage.getItem(
"categoryItems"
);

if(saved){

items=
JSON.parse(saved);

}

loadItems();

/* LOGOUT */

function logout(){

window.location.href="index.html";

}

</script>

</body>

</html>
