<!DOCTYPE html>
<html>

<head>
<title>Shoba Provision List</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* BODY */

body{

font-family:'Segoe UI',sans-serif;

background:linear-gradient(
135deg,
#dbeafe,
#fef9c3,
#dcfce7
);

padding:15px;

}

/* CONTAINER */

.container{
max-width:500px;
margin:auto;
}

/* HEADER */

.header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:15px;
}

/* LOGOUT */

.logout-btn{

background:#6b7280;
color:white;

border:none;

padding:8px 14px;

border-radius:8px;

cursor:pointer;
}

/* SEARCH */

.search-box{

width:100%;
padding:12px;

border-radius:10px;

border:1px solid #ccc;

margin-bottom:12px;

}

/* CATEGORY */

.category{

font-weight:bold;

margin-top:18px;

color:#333;

}

/* CARD */

.card{

background:white;

padding:14px;

margin-bottom:10px;

border-radius:12px;

box-shadow:
0 4px 10px rgba(0,0,0,0.08);

display:flex;

justify-content:space-between;

align-items:center;
}

/* CUSTOM BOX */

.custom-box{

background:white;

padding:12px;

border-radius:12px;

margin-bottom:12px;

display:flex;
gap:6px;

}

.custom-box input{

padding:8px;
border-radius:6px;
border:1px solid #ccc;

}

/* BUTTON */

.add-btn{

background:#3b82f6;
color:white;

border:none;

padding:8px 12px;

border-radius:8px;

cursor:pointer;

}

/* SUBMIT */

.submit-btn{

width:100%;

padding:14px;

margin-top:15px;

background:linear-gradient(
135deg,
#22c55e,
#16a34a
);

color:white;

border:none;

border-radius:10px;

font-weight:bold;

cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>Shoba Dashboard</h2>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<input
type="text"
id="searchInput"
class="search-box"
placeholder="🔍 Search items"
onkeyup="searchItems()"
>

<!-- CUSTOM ITEM -->

<div class="custom-box">

<input
type="text"
id="customItem"
placeholder="Item Name">

<input
type="text"
id="customQty"
placeholder="Quantity (Example: 1 L, 100 g, 2 packets)">

<button
class="add-btn"
onclick="addCustomItem()">

Add

</button>

</div>

<!-- CATEGORY SECTIONS -->

<div class="category">Liquids</div>
<div id="liquidList"></div>

<div class="category">Bulk Items</div>
<div id="bulkList"></div>

<div class="category">Small Items</div>
<div id="smallList"></div>

<div class="category">Packet Foods</div>
<div id="packetList"></div>

<div class="category">Sachets</div>
<div id="sachetList"></div>

<button
class="submit-btn"
onclick="submitList()">

Submit List

</button>

</div>

<script>

/* DEFAULT ITEMS */

let items={

liquid:["Oil","Milk"],

bulk:["Rice","Wheat Flour"],

small:["Mustard","Pepper"],

packet:["Chips","Masala"],

sachet:["Shampoo"]

};

/* LOAD SAVED ITEMS */

let savedItems=
localStorage.getItem("categoryItems");

if(savedItems){

items=JSON.parse(savedItems);

}

/* DEFAULT QUANTITIES */

const quantities={

liquid:[
"250 ml","500 ml","750 ml",
"1 L","1.5 L","2 L"
],

bulk:[
"250 g","500 g","750 g",
"1 kg","1.5 kg","2 kg"
],

small:[
"50 g","100 g","250 g"
],

packet:[
"1 packet","2 packets","3 packets",
"50 g","100 g"
],

sachet:[
"1 sachet","2 sachets","3 sachets"
]

};

/* LOAD ITEMS */

function loadItems(){

for(let category in items){

let container=
document.getElementById(category+"List");

container.innerHTML="";

items[category].forEach(name=>{

let selectOptions="";

/* CUSTOM QUANTITY */

let savedQty=
localStorage.getItem(name+"_qty");

if(savedQty){

selectOptions=
`<option>${savedQty}</option>`;

}

else{

quantities[category].forEach(q=>{

selectOptions+=
`<option>${q}</option>`;

});

}

let card=
document.createElement("div");

card.className="card item";

card.innerHTML=

`
<div>

<input type="checkbox"
value="${name}">

${name}

</div>

<select id="${name}">

${selectOptions}

</select>
`;

container.appendChild(card);

});

}

}

/* AUTO CATEGORY DETECTION */

function detectCategory(qty){

qty=qty.toLowerCase();

if(qty.includes("ml") ||
   qty.includes("l")){

return "liquid";

}

if(qty.includes("sachet")){

return "sachet";

}

if(qty.includes("packet") ||
   qty.includes("piece")){

return "packet";

}

if(qty.includes("g")){

if(qty.includes("50") ||
   qty.includes("100")){

return "small";

}

return "bulk";

}

return "bulk";

}

/* ADD CUSTOM ITEM */

function addCustomItem(){

let name=
document.getElementById("customItem").value.trim();

let qty=
document.getElementById("customQty").value.trim();

if(name==="" || qty==="") return;

let category=
detectCategory(qty);

/* PREVENT DUPLICATE */

if(!items[category].includes(name)){

items[category].push(name);

}

/* SAVE */

localStorage.setItem(
"categoryItems",
JSON.stringify(items)
);

/* SAVE QUANTITY */

localStorage.setItem(
name+"_qty",
qty
);

/* REFRESH */

loadItems();

document.getElementById("customItem").value="";
document.getElementById("customQty").value="";

}

/* SEARCH */

function searchItems(){

let filter=
document.getElementById("searchInput")
.value.toLowerCase();

let itemsList=
document.getElementsByClassName("item");

for(let i=0;i<itemsList.length;i++){

let text=
itemsList[i].innerText.toLowerCase();

itemsList[i].style.display=
text.includes(filter)?"":"none";

}

}

/* SUBMIT LIST */

function submitList(){

let checked=
document.querySelectorAll(
'input[type="checkbox"]:checked'
);

let list=[];

checked.forEach(item=>{

let name=item.value;

let qty=
document.getElementById(name).value;

list.push(name+" - "+qty);

});

if(list.length===0){

alert("Please select at least one item.");

return;

}

let history=
JSON.parse(
localStorage.getItem("allLists")
)||[];

let now=new Date();

history.push({

time:now.toLocaleString(),

items:list,

status:"pending"

});

localStorage.setItem(
"allLists",
JSON.stringify(history)
);

/* REDIRECT TO THANK YOU PAGE */

window.location.href="thankyou.html";

}

/* LOGOUT */

function logout(){

window.location.href="index.html";

}

/* INITIAL LOAD */

loadItems();

</script>

</body>

</html>
