<!DOCTYPE html>
<html>

<head>
<title>Shoba Provision List</title>

<style>

/* RESET */
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

/* BODY */
body {

font-family: 'Segoe UI', sans-serif;

background: linear-gradient(
135deg,
#dbeafe,
#fef9c3,
#dcfce7
);

min-height: 100vh;

padding: 15px;
}

/* CONTAINER */
.container {

max-width: 500px;
margin: auto;

}

/* HEADER */
.header {

display: flex;
justify-content: space-between;
align-items: center;

margin-bottom: 15px;

}

.header-title h2 {
color: #333;
margin-bottom: 3px;
}

.header-title p {
color: #555;
font-size: 14px;
}

/* LOGOUT BUTTON */
.logout-btn {

padding: 8px 14px;

background: #6b7280;

color: white;

border: none;

border-radius: 8px;

cursor: pointer;

font-size: 14px;

}

/* SEARCH */
.search-box {

width: 100%;

padding: 12px;

border-radius: 10px;

border: 1px solid #ccc;

font-size: 16px;

margin-bottom: 15px;

background: white;

}

/* CARD */
.card {

background: white;

padding: 14px;

margin-bottom: 10px;

border-radius: 12px;

box-shadow:
0 4px 10px rgba(0,0,0,0.08);

display: flex;

justify-content: space-between;

align-items: center;

}

/* LEFT SIDE */
.item-left {

display: flex;

align-items: center;

gap: 10px;

font-size: 16px;

}

/* DROPDOWN */
select {

padding: 6px;

border-radius: 6px;

border: 1px solid #ccc;

}

/* ADD CUSTOM ITEM */
.custom-box {

background: white;

padding: 12px;

border-radius: 12px;

margin-bottom: 15px;

box-shadow:
0 4px 10px rgba(0,0,0,0.08);

display: flex;
gap: 8px;

}

/* TEXT INPUT */
.custom-box input {

flex: 1;

padding: 8px;

border-radius: 6px;

border: 1px solid #ccc;

}

/* ADD BUTTON */
.add-btn {

background: #3b82f6;

color: white;

border: none;

padding: 8px 12px;

border-radius: 8px;

cursor: pointer;

}

/* SUBMIT BUTTON */
.submit-btn {

width: 100%;

padding: 14px;

font-size: 16px;

margin-top: 10px;

background: linear-gradient(
135deg,
#22c55e,
#16a34a
);

color: white;

border: none;

border-radius: 10px;

font-weight: bold;

cursor: pointer;

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="header-title">

<h2>Shoba Dashboard</h2>
<p>Select household items</p>

</div>

<button class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<!-- SEARCH -->

<input
type="text"
id="searchInput"
class="search-box"
placeholder="🔍 Search items..."
onkeyup="searchItems()"
>

<!-- CUSTOM ITEM ADD -->

<div class="custom-box">

<input
type="text"
id="customItem"
placeholder="Add new item"
>

<select id="customQty">

<option>250 g</option>
<option>500 g</option>
<option>1 kg</option>
<option>2 kg</option>
<option>1 L</option>
<option>2 L</option>

</select>

<button
class="add-btn"
onclick="addCustomItem()">

Add

</button>

</div>

<!-- ITEM LIST -->

<div id="itemContainer">

<div class="card item">

<div class="item-left">

<input type="checkbox"
value="Rice"
onclick="resetSearch()">

<span>Rice</span>

</div>

<select id="Rice">

<option>250 g</option>
<option>500 g</option>
<option>1 kg</option>

</select>

</div>

<div class="card item">

<div class="item-left">

<input type="checkbox"
value="Oil"
onclick="resetSearch()">

<span>Oil</span>

</div>

<select id="Oil">

<option>250 ml</option>
<option>500 ml</option>
<option>1 L</option>

</select>

</div>

<div class="card item">

<div class="item-left">

<input type="checkbox"
value="Sugar"
onclick="resetSearch()">

<span>Sugar</span>

</div>

<select id="Sugar">

<option>250 g</option>
<option>500 g</option>
<option>1 kg</option>

</select>

</div>

</div>

<!-- SUBMIT -->

<button
class="submit-btn"
onclick="submitList()">

Submit List

</button>

</div>

<script>

/* SEARCH */

function searchItems(){

let input =
document.getElementById("searchInput");

let filter =
input.value.toLowerCase();

let items =
document.getElementsByClassName("item");

for (let i=0;i<items.length;i++){

let text =
items[i].innerText.toLowerCase();

if(text.includes(filter)){

items[i].style.display="";

}
else{

items[i].style.display="none";

}

}

}

/* RESET SEARCH AFTER CHECK */

function resetSearch(){

document.getElementById(
"searchInput"
).value="";

searchItems();

}

/* ADD CUSTOM ITEM */

function addCustomItem(){

let name =
document.getElementById(
"customItem"
).value;

let qty =
document.getElementById(
"customQty"
).value;

if(name==="") return;

let container =
document.getElementById(
"itemContainer"
);

/* CREATE CARD */

let card =
document.createElement("div");

card.className="card item";

card.innerHTML=

`
<div class="item-left">

<input type="checkbox"
value="${name}"
onclick="resetSearch()">

<span>${name}</span>

</div>

<select id="${name}">

<option>${qty}</option>

</select>
`;

container.appendChild(card);

/* CLEAR INPUT */

document.getElementById(
"customItem"
).value="";

}

/* SUBMIT */

function submitList(){

let items =
document.querySelectorAll(
'input[type="checkbox"]:checked'
);

let list=[];

items.forEach(function(item){

let name=item.value;

let qty=
document.getElementById(name).value;

list.push(name+" - "+qty);

});

localStorage.setItem(
"provisionList",
JSON.stringify(list)
);

alert("List Submitted!");

}

/* LOGOUT */

function logout(){

window.location.href=
"index.html";

}

</script>

</body>

</html>
