<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="style.css">

<title>Shoba Dashboard</title>

<!-- Firebase -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDoc,
doc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* Firebase Config */

const firebaseConfig = {

apiKey: "AIzaSyAxK-JoTWUGHTZxOtE_UckLCwz-GJw4uWo",

authDomain: "family-provision.firebaseapp.com",

projectId: "family-provision",

storageBucket: "family-provision.firebasestorage.app",

messagingSenderId: "533219133266",

appId: "1:533219133266:web:6a0b1846fd969a4abb5c8b"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.db=db;
window.collection=collection;
window.addDoc=addDoc;
window.getDoc=getDoc;
window.doc=doc;
window.setDoc=setDoc;

</script>

</head>

<body>

<div class="container">

<div class="header">

<h2>Shoba Dashboard</h2>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<input
type="text"
placeholder="🔍 Search items"
class="search-box"
onkeyup="searchItems(this.value)">

<!-- CUSTOM ITEM -->

<div class="custom-box">

<input
type="text"
id="customItem"
placeholder="Item Name">

<input
type="text"
id="customQty"
placeholder="Quantity (Example: 1 L, 100 g)">

<button
class="add-btn"
onclick="addCustomItem()">

Add

</button>

</div>

<!-- CATEGORY LISTS -->

<div id="liquidSection"></div>

<div id="bulkSection"></div>

<div id="smallSection"></div>

<div id="packetSection"></div>

<div id="sachetSection"></div>

<button
class="submit-btn"
onclick="submitList()">

Submit List

</button>

</div>

<script>

/* DEFAULT ITEMS */

let defaultItems = {

liquid:["Oil","Milk"],

bulk:["Rice","Wheat Flour"],

small:["Mustard","Pepper"],

packet:["Chips","Masala"],

sachet:["Shampoo"]

};

let itemsData = defaultItems;

/* LOAD FROM FIREBASE */

window.onload = async function(){

await loadItems();

};

/* LOAD ITEMS */

async function loadItems(){

try{

let ref =
doc(db,"categoryItems","main");

let snap =
await getDoc(ref);

if(snap.exists()){

itemsData = snap.data();

}

else{

await setDoc(
ref,
defaultItems
);

itemsData = defaultItems;

}

displayAll();

}

catch(error){

console.log(error);

itemsData = defaultItems;

displayAll();

}

}

/* DISPLAY ALL */

function displayAll(){

displayCategory("Liquids","liquid");

displayCategory("Bulk Items","bulk");

displayCategory("Small Items","small");

displayCategory("Packet Foods","packet");

displayCategory("Sachets","sachet");

}

/* DISPLAY CATEGORY */

function displayCategory(title,key){

let section =
document.getElementById(key+"Section");

section.innerHTML =
`<div class="category">${title}</div>`;

itemsData[key].forEach(item=>{

section.innerHTML += createItemRow(item,key);

});

}

/* CREATE ROW */

function createItemRow(item,category){

let qtyOptions="";

/* LIQUID */

if(category==="liquid"){

qtyOptions=`

<option>250 ml</option>
<option>500 ml</option>
<option>1 L</option>

`;

}

/* BULK */

if(category==="bulk"){

qtyOptions=`

<option>250 g</option>
<option>500 g</option>
<option>750 g</option>
<option>1 kg</option>
<option>1.5 kg</option>
<option>2 kg</option>

`;

}

/* SMALL */

if(category==="small"){

qtyOptions=`

<option>50 g</option>
<option>100 g</option>
<option>200 g</option>

`;

}

/* PACKET */

if(category==="packet"){

qtyOptions=`

<option>1 packet</option>
<option>2 packet</option>
<option>3 packet</option>

`;

}

/* SACHET */

if(category==="sachet"){

qtyOptions=`

<option>1 sachet</option>
<option>2 sachet</option>
<option>3 sachet</option>

`;

}

return `

<div class="card item">

<div>

<input
type="checkbox"
value="${item}">

${item}

</div>

<select id="${item}">

${qtyOptions}

</select>

</div>

`;

}

/* ADD CUSTOM ITEM */

async function addCustomItem(){

let name =
document.getElementById("customItem").value.trim();

let qty =
document.getElementById("customQty").value;

if(name==="") return;

/* CATEGORY DETECTION */

let category="small";

if(qty.includes("L") || qty.includes("ml"))
category="liquid";

if(qty.includes("kg") || qty.includes("g")){

let num=parseInt(qty);

if(num>=250)
category="bulk";

}

/* LOAD LATEST DATA */

let ref =
doc(db,"categoryItems","main");

let snap =
await getDoc(ref);

let currentData;

if(snap.exists()){

currentData = snap.data();

}else{

currentData = defaultItems;

}

/* ADD ITEM SAFELY */

if(!currentData[category].includes(name)){

currentData[category].push(name);

}

/* SAVE */

await setDoc(
ref,
currentData
);

itemsData=currentData;

displayAll();

/* CLEAR */

document.getElementById("customItem").value="";
document.getElementById("customQty").value="";

}

/* SEARCH */

function searchItems(text){

let items =
document.querySelectorAll(".card");

text=text.toLowerCase();

items.forEach(item=>{

let name =
item.innerText.toLowerCase();

item.style.display=
name.includes(text)
? "flex"
: "none";

});

}

/* SUBMIT LIST */

async function submitList(){

let checked =
document.querySelectorAll(
'input[type="checkbox"]:checked'
);

let list=[];

checked.forEach(item=>{

let name=item.value;

let qty =
document.getElementById(name).value;

list.push(name+" - "+qty);

});

if(list.length===0){

alert("Select at least one item");

return;

}

await addDoc(
collection(db,"provisionLists"),
{

time: new Date().toLocaleString(),

items:list,

status:"pending",

shop:"",
amount:""

}

);

window.location.href="thankyou.html";

}

/* LOGOUT */

function logout(){

window.location.href="index.html";

}

</script>

</body>

</html>
